name: Run brief

on:
  workflow_dispatch:
    inputs:
      brief:
        description: "Path to the brief YAML to execute"
        required: true
        default: briefs/fraude-bikes-unit-economics.yml
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run brief
        env:
          DEFAULT_MODE_ACCOUNT: ${{ secrets.DEFAULT_MODE_ACCOUNT }}
          MODE_TOKEN: ${{ secrets.MODE_TOKEN }}
          MODE_SECRET: ${{ secrets.MODE_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/executor.py "${{ inputs.brief }}"
