name: Run due briefs

# Master scheduler: every 15 minutes, scan briefs/*.yml and dispatch the
# ones whose schedule cron is due now. The window matches the cron interval
# so each brief fires exactly once per scheduled period.
#
# Manual trigger is also available for testing the scheduler logic without
# waiting for the next cron tick.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute timestamp
        id: ts
        run: echo "value=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_OUTPUT"

      - name: Scan and dispatch due briefs
        env:
          DEFAULT_MODE_ACCOUNT: ${{ secrets.DEFAULT_MODE_ACCOUNT }}
          MODE_TOKEN: ${{ secrets.MODE_TOKEN }}
          MODE_SECRET: ${{ secrets.MODE_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/due_runner.py

      - name: Upload run records
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runs-due-${{ steps.ts.outputs.value }}-${{ github.run_id }}
          path: out/*.run.json
          retention-days: 90
          if-no-files-found: ignore
