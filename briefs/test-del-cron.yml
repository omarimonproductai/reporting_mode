prompt: |-
  Mostra la fila més recent de les dades per iOS i la més recent per Android.
  Fes una interpretació de les dades en 1 frase.
  Afegeix un link a https://cooltra.com que sigui clicable.

  Estructura del brief (200 palabras, sin secciones explícitas, párrafos cortos)

  Reglas estrictas:
  - Porcentajes con un decimal (ej. 67.3%).
  - Lenguaje directo, sin introducciones genéricas ("En este informe...", "Como podemos observar...") ni conclusiones.
  - No inventes datos. Si una versión no aparece en la fecha más reciente, no la menciones.
  - No uses la palabra "tasa". Usa "porcentaje" o "%" directamente.
